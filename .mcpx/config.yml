# mcpx configuration — MCP server proxy
# See: mcpx --help

security:
    enabled: true
    global:
        audit:
            enabled: true
            log: "$(mcpx.project_root)/.mcpx/audit.jsonl"
            redact: ["$(secret.*)"]
        policies:
            - name: no-path-traversal
              match:
                  args:
                      "*path*":
                          deny_pattern: "\\.\\.\\/|\\.\\.\\\\\\/"
              action: deny
              message: "Path traversal blocked"

servers:
    serena:
        command: serena
        args:
            - start-mcp-server
            - --context=claude-code
            - --project-from-cwd
        transport: stdio
        daemon: true
        startup_timeout: 30s
