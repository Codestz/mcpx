version: 2

project_name: mcpx

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test -race ./...

builds:
  - main: ./cmd/mcpx
    binary: mcpx
    ldflags:
      - -s -w
      - -X github.com/codestz/mcpx/internal/cli.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: codestz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/codestz/mcpx"
    description: "MCP servers as CLI tools — built for AI agents"
    license: "MIT"
    install: |
      bin.install "mcpx"
    test: |
      system "#{bin}/mcpx", "version"

release:
  github:
    owner: codestz
    name: mcpx
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
