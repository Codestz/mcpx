version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docs):"
    labels:
      - dependencies
      - docs
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci:"
    labels:
      - ci
    open-pull-requests-limit: 3
